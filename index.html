<style>
/* ================================================================
   REGISTRO — design "Archivio vivo"
   Bianco/grafite, un accento indaco elettrico. Display Fraunces
   (serif contemporaneo), corpo Inter, metadati mono.
   Navigazione a 4 livelli con timeline nello storico controparte.
   ================================================================ */
:root{
  --bg:#fafafa;
  --panel:#ffffff;
  --ink:#16161a;
  --ink-2:#5c5c66;
  --ink-3:#9a9aa6;
  --line:#ececf0;
  --line-2:#e0e0e6;
  --accent:#4f46e5;      /* indaco elettrico */
  --accent-2:#6d64f0;
  --accent-soft:#eeecfe;
  --grafite:#1d1d24;     /* header scuro */
  --grafite-2:#2a2a34;
  --ok:#0f9d6a; --ok-soft:#e4f6ee;
  --warn:#c77914; --warn-soft:#fbeedd;
  --pro:#7c3aed; --pro-soft:#f1e9fe;
  --danger:#dc2626;
  --shadow-sm:0 1px 2px rgba(20,20,30,.05);
  --shadow:0 4px 16px rgba(20,20,30,.07);
  --shadow-lg:0 12px 40px rgba(20,20,30,.14);
  --r:12px; --r-sm:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{padding-bottom:env(safe-area-inset-bottom)}
h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.01em}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}

/* ---------- HEADER ---------- */
header{
  background:linear-gradient(120deg,var(--grafite),var(--grafite-2));
  color:#fff;padding:18px 26px;padding-top:calc(18px + env(safe-area-inset-top));
  display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:30;
}
header .logo{display:flex;align-items:center;gap:12px}
header .mark{width:34px;height:34px;border-radius:9px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:19px}
header h1{font-size:21px;color:#fff;line-height:1}
header h1 small{display:block;font-family:'JetBrains Mono',monospace;font-size:9.5px;
  letter-spacing:3px;text-transform:uppercase;color:#a5a5c0;font-weight:400;margin-top:3px}
header .grow{flex:1}
.hsearch{position:relative;width:min(340px,38vw)}
.hsearch input{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);
  color:#fff;border-radius:10px;padding:10px 14px 10px 38px;font-size:14px;font-family:inherit;outline:none}
.hsearch input::placeholder{color:#b8b8cc}
.hsearch input:focus{background:rgba(255,255,255,.16);border-color:var(--accent-2)}
.hsearch svg{position:absolute;left:12px;top:11px;opacity:.6}
.hbtn{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:9px;
  width:38px;height:38px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s}
.hbtn:hover{background:rgba(255,255,255,.22)}

/* ---------- BREADCRUMB ---------- */
.crumb{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 26px;
  display:flex;align-items:center;gap:9px;font-size:13.5px;position:sticky;top:71px;z-index:20;flex-wrap:wrap}
.crumb a{color:var(--ink-2);cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px}
.crumb a:hover{color:var(--accent)}
.crumb b{color:var(--ink);font-weight:600}
.crumb .sep{color:var(--ink-3);font-size:12px}

/* ---------- MAIN ---------- */
main{max-width:1080px;margin:0 auto;padding:26px}
.view-title{font-size:28px;margin-bottom:4px}
.view-sub{color:var(--ink-2);font-size:14px;margin-bottom:24px}

/* griglia società */
.soc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.soc-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:20px;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
.soc-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);
  transform:scaleY(0);transform-origin:top;transition:.2s}
.soc-card:hover{border-color:var(--line-2);box-shadow:var(--shadow);transform:translateY(-2px)}
.soc-card:hover::before{transform:scaleY(1)}
.soc-card .ic{width:42px;height:42px;border-radius:11px;background:var(--accent-soft);color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:14px}
.soc-card h3{font-size:18px;margin-bottom:3px}
.soc-card .d{font-size:12.5px;color:var(--ink-3)}
.soc-card .cnt{position:absolute;top:18px;right:18px;font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--ink-3)}

/* categorie */
.cat-list{display:flex;flex-direction:column;gap:10px;max-width:640px}
.cat-row{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:16px 18px;display:flex;align-items:center;gap:15px;cursor:pointer;transition:.15s}
.cat-row:hover{border-color:var(--line-2);box-shadow:var(--shadow-sm);transform:translateX(3px)}
.cat-row .ci{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0}
.cat-row .ct{flex:1}
.cat-row h3{font-size:16px;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:0}
.cat-row .cs{font-size:12.5px;color:var(--ink-3);margin-top:1px}
.cat-row .cn{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--ink-2)}
.cat-row .car{color:var(--ink-3);font-size:17px}
.ci.cliente{background:#e6f0fe;color:#2563d6}
.ci.fornitore{background:var(--pro-soft);color:var(--pro)}
.ci.dipendente{background:var(--ok-soft);color:var(--ok)}
.ci.sindacato{background:var(--warn-soft);color:var(--warn)}
.ci.progetto{background:#f0f0f4;color:var(--ink-2)}

/* controparti (livello 3) */
.cp-toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.btn{border:none;border-radius:var(--r-sm);cursor:pointer;font-family:inherit;font-size:14px;
  font-weight:600;padding:10px 16px;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-2)}
.btn-soft{background:var(--panel);color:var(--ink);border:1px solid var(--line-2)}
.btn-soft:hover{background:#f4f4f7}
.btn-sm{padding:8px 13px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.cp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.cp-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:16px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:13px}
.cp-card:hover{border-color:var(--line-2);box-shadow:var(--shadow);transform:translateY(-2px)}
.cp-av{width:44px;height:44px;border-radius:11px;background:var(--accent-soft);color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;font-family:'Inter'}
.cp-card .cpt{flex:1;min-width:0}
.cp-card h3{font-size:15.5px;font-family:'Inter';font-weight:600;letter-spacing:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cp-card .cpd{font-size:12px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cp-card .cpn{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3);margin-top:4px}

/* storico controparte (livello 4) */
.detail-head{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:22px;margin-bottom:20px;display:flex;align-items:flex-start;gap:18px}
.detail-head .dav{width:58px;height:58px;border-radius:14px;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;flex-shrink:0}
.detail-head .dt{flex:1}
.detail-head h2{font-size:24px;margin-bottom:3px}
.detail-head .dsub{color:var(--ink-2);font-size:13.5px}
.detail-badges{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
.badge{font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--accent-soft);color:var(--accent)}
.badge.o{background:#f0f0f4;color:var(--ink-2)}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap}

/* filtro società selezionabile */
.filterbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;
  padding:10px 14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-sm)}
.filterbar .fl{font-size:12px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.fchip{font-size:12.5px;font-weight:500;padding:5px 12px;border-radius:20px;cursor:pointer;
  border:1px solid var(--line-2);background:var(--panel);color:var(--ink-2);transition:.12s}
.fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* timeline */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:"";position:absolute;left:8px;top:8px;bottom:8px;width:2px;background:var(--line-2)}
.tl-item{position:relative;margin-bottom:14px}
.tl-item::before{content:"";position:absolute;left:-24px;top:20px;width:12px;height:12px;border-radius:50%;
  background:var(--panel);border:2.5px solid var(--accent);z-index:1}
.tl-item.doc::before{border-color:var(--ink-3);border-radius:3px}
.tl-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px 17px;
  cursor:pointer;transition:.15s;border-left:3px solid var(--accent)}
.tl-card:hover{box-shadow:var(--shadow);border-color:var(--line-2)}
.tl-card.doc{border-left-color:var(--ink-3)}
.tl-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3);margin-bottom:5px;
  display:flex;align-items:center;gap:8px}
.tl-kind{font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:2px 8px;border-radius:5px}
.tl-kind.riun{background:var(--accent-soft);color:var(--accent)}
.tl-kind.doc{background:#f0f0f4;color:var(--ink-2)}
.tl-card h4{font-size:15.5px;font-family:'Inter';font-weight:600;margin-bottom:5px}
.tl-card p{font-size:13px;color:var(--ink-2);line-height:1.55}
.tl-meta{display:flex;gap:14px;margin-top:9px;font-size:12px;color:var(--ink-3);flex-wrap:wrap}
.tl-meta span{display:flex;align-items:center;gap:5px}
.tl-aztag{font-size:10.5px;font-weight:600;padding:1px 8px;border-radius:12px;background:#f0f0f4;color:var(--ink-2)}

/* empty */
.empty{text-align:center;padding:60px 20px;color:var(--ink-3)}
.empty .ei{font-size:40px;margin-bottom:14px;opacity:.4}
.empty .eb{font-family:'Fraunces',serif;font-size:20px;color:var(--ink);margin-bottom:6px}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(20,20,30,.55);backdrop-filter:blur(4px);z-index:60;
  display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:18px;width:100%;max-width:720px;margin:auto;
  box-shadow:var(--shadow-lg);overflow:hidden}
.modal-head{background:linear-gradient(120deg,var(--grafite),var(--grafite-2));color:#fff;
  padding:20px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:2}
.modal-head h2{font-size:20px;color:#fff;flex:1}
.modal-head .mx{background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;
  border-radius:9px;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-head .mx:hover{background:rgba(255,255,255,.24)}
.modal-body{padding:24px}
.field{margin-bottom:17px}
.field label{display:block;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
  color:var(--ink-3);margin-bottom:7px}
.field input,.field textarea,.field select{width:100%;padding:11px 13px;border:1px solid var(--line-2);
  border-radius:var(--r-sm);background:var(--panel);font-size:14.5px;font-family:inherit;color:var(--ink)}
.field textarea{resize:vertical;min-height:88px;line-height:1.55}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft)}
.row{display:flex;gap:14px;flex-wrap:wrap}
.row .field{flex:1;min-width:170px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-size:13px;font-weight:500;padding:8px 14px;border-radius:22px;cursor:pointer;user-select:none;
  background:var(--panel);border:1.5px solid var(--line-2);color:var(--ink-2);transition:.12s}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.taginput{display:flex;flex-wrap:wrap;gap:7px;padding:8px;border:1px solid var(--line-2);
  border-radius:var(--r-sm);background:var(--panel);min-height:46px;align-items:center}
.taginput .t{background:#f0f0f4;border-radius:16px;padding:4px 9px 4px 12px;font-size:13px;
  font-weight:500;display:flex;align-items:center;gap:7px}
.taginput .t b{cursor:pointer;color:var(--danger);font-weight:700}
.taginput input{border:none;outline:none;flex:1;min-width:120px;font-size:14px;font-family:inherit;background:none;padding:4px}
.divider{border:none;border-top:1px solid var(--line);margin:22px 0 18px}
.sec-label{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:12px;
  display:flex;align-items:center;gap:9px;color:var(--ink)}
.rec-bar{display:flex;align-items:center;gap:11px;flex-wrap:wrap;padding:13px;
  background:#fdecec;border:1px solid #f8d4d4;border-radius:var(--r-sm);margin-bottom:12px}
.rec-dot{width:10px;height:10px;border-radius:50%;background:var(--danger)}
.rec-dot.live{animation:pulse 1.1s infinite}
@keyframes pulse{50%{opacity:.25}}
.rec-status{font-family:'JetBrains Mono',monospace;font-size:12px;color:#b02121;flex:1}
.todo-item{display:flex;align-items:center;gap:10px;padding:6px 0}
.todo-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--ok);cursor:pointer}
.todo-item span{flex:1;font-size:14.5px}
.todo-item span.done{text-decoration:line-through;color:var(--ink-3)}
.todo-item .del{cursor:pointer;color:var(--danger);font-weight:700;padding:0 6px}
.alleg{display:flex;align-items:center;gap:11px;padding:9px 12px;background:var(--panel);
  border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:7px;font-size:14px}
.alleg .an{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alleg a{color:var(--accent);cursor:pointer;font-weight:600;text-decoration:none}
.alleg .del{cursor:pointer;color:var(--danger);font-weight:700;padding:0 6px}
.actions{display:flex;gap:11px;justify-content:flex-end;margin-top:24px;flex-wrap:wrap;align-items:center}
.btn-danger{background:none;color:var(--danger);border:1px solid var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}

/* login */
#login{position:fixed;inset:0;background:linear-gradient(140deg,var(--grafite),#12121a);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:24px}
#login .box{background:var(--panel);border-radius:18px;padding:38px 34px;max-width:400px;width:100%;box-shadow:var(--shadow-lg)}
#login .mark{width:48px;height:48px;border-radius:13px;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;font-family:'Fraunces';font-weight:700;font-size:26px;margin-bottom:20px}
#login h2{font-size:26px;margin-bottom:4px}
#login p{color:var(--ink-2);font-size:14px;margin-bottom:24px}
#login input{width:100%;padding:13px;border:1px solid var(--line-2);border-radius:var(--r-sm);
  margin-bottom:12px;font-size:15px;font-family:inherit}
#login input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
#login .err{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:13px 24px;border-radius:11px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);
  z-index:200;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:640px){
  header{padding:14px 16px;gap:10px}
  header h1{font-size:18px}.hsearch{display:none}
  .crumb{padding:10px 16px;top:59px}
  main{padding:18px 16px}
  .view-title{font-size:23px}
  .detail-head{flex-direction:column;gap:12px}
}

/* ================= v3: nav header, cruscotto, rubrica ================= */
.hnav{display:flex;gap:4px;margin-right:6px}
.hnav a{color:#c8c8dc;font-size:13.5px;font-weight:500;padding:7px 12px;border-radius:8px;cursor:pointer;transition:.15s}
.hnav a:hover{background:rgba(255,255,255,.12);color:#fff}
@media(max-width:640px){.hnav{display:none}}

/* Cruscotto */
.dash-block{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:16px}
.dash-h{font-family:'Fraunces',serif;font-size:17px;font-weight:600;display:flex;align-items:center;gap:9px;margin-bottom:14px}
.dash-ic{font-size:18px}
.dash-count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink-3);
  background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:1px 10px}
.dash-empty{color:var(--ink-3);font-size:14px;padding:6px 2px}

/* Radar scadenze */
.dead-list{display:flex;flex-direction:column;gap:8px}
.dead-row{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--line);
  border-radius:var(--r-sm);cursor:pointer;transition:.15s;background:var(--panel)}
.dead-row:hover{box-shadow:var(--shadow-sm);border-color:var(--line-2)}
.dead-row.scaduto{border-left:3px solid var(--danger);background:#fef5f5}
.dead-row.oggi{border-left:3px solid var(--warn)}
.dead-row.presto{border-left:3px solid var(--accent)}
.dead-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.dead-badge.scaduto{background:#fde2e2;color:#b02121}
.dead-badge.oggi{background:var(--warn-soft);color:var(--warn)}
.dead-badge.presto{background:var(--accent-soft);color:var(--accent)}
.dead-badge.ok{background:var(--bg);color:var(--ink-3)}
.dead-body{flex:1;min-width:0}
.dead-body b{font-size:14.5px;font-weight:600;display:block}
.dead-meta{font-size:12.5px;color:var(--ink-3)}
.dead-arrow{color:var(--ink-3);font-size:17px}

/* To-do raggruppati */
.todo-group{margin-bottom:14px}
.todo-group-h{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--ink-3);margin-bottom:6px}
.todo-line{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;transition:.12s}
.todo-line:hover{background:var(--bg)}
.todo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.todo-line span:nth-child(2){flex:1;font-size:14.5px}
.todo-line-meta{font-size:12px;color:var(--ink-3)}

/* Partecipanti da rubrica */
.part-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.part-tags .t{background:var(--accent-soft);color:var(--accent);border-radius:16px;
  padding:5px 10px 5px 13px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.part-tags .t b{cursor:pointer;font-weight:700}
.part-search{position:relative}
.part-search input{width:100%;padding:11px 13px;border:1px solid var(--line-2);border-radius:var(--r-sm);
  background:var(--panel);font-size:14.5px;font-family:inherit;color:var(--ink)}
.part-search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.part-sugg{display:none;position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--panel);
  border:1px solid var(--line-2);border-radius:var(--r-sm);box-shadow:var(--shadow);z-index:5;overflow:hidden}
.sugg-row{padding:10px 13px;cursor:pointer;display:flex;align-items:baseline;gap:9px;font-size:14px}
.sugg-row:hover{background:var(--accent-soft)}
.sugg-row b{font-weight:600}
.sugg-row span{font-size:12.5px;color:var(--ink-3)}
.sugg-empty{padding:11px 13px;font-size:13px;color:var(--ink-3)}

/* To-do con scadenza (nel form) */
.todo-scad{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:14px;cursor:pointer;
  background:var(--bg);color:var(--ink-3);border:1px dashed var(--line-2);white-space:nowrap}
.todo-scad:hover{border-color:var(--accent);color:var(--accent)}
.todo-scad.set{background:var(--warn-soft);color:var(--warn);border:1px solid transparent}

/* ================= badge coda offline ================= */
#outbox-badge{position:fixed;bottom:16px;right:16px;z-index:250;
  background:var(--warn,#b45309);color:#fff;padding:9px 15px;border-radius:22px;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.22);display:flex;align-items:center;gap:6px;
  transition:transform .15s}
#outbox-badge:hover{transform:translateY(-2px)}

</style>
</head>
<body>

<!-- LOGIN -->

<!-- MODAL RIUNIONE -->
<div class="overlay" id="ov-riun">
  <div class="modal">
    <div class="modal-head"><h2 id="mr-title">Nuova riunione</h2>
      <button class="mx" onclick="closeModal('ov-riun')">×</button></div>
    <div class="modal-body">
      <div class="row">
        <div class="field" style="flex:2"><label>Titolo</label>
          <input type="text" id="r-titolo" placeholder="Es. Rinnovo contratto carta"></div>
        <div class="field"><label>Data e ora</label><input type="datetime-local" id="r-data"></div>
      </div>
      <div class="field"><label>Luogo</label><input type="text" id="r-luogo" placeholder="Sede Roma / Teams"></div>
      <div class="field"><label>Società coinvolte</label><div class="chips" id="r-aziende"></div></div>
      <div class="field"><label>Partecipanti <span style="text-transform:none;font-weight:400;color:var(--ink-3)">(dalla rubrica)</span></label>
        <div id="r-part-tags" class="part-tags"></div>
        <div class="part-search">
          <input type="text" id="r-part-input" placeholder="Cerca una persona…" oninput="partInput(event)" onkeydown="partKey(event)" autocomplete="off">
          <div id="r-part-sugg" class="part-sugg"></div>
        </div></div>

      <hr class="divider">
      <div class="sec-label">🎙 Registrazione &amp; trascrizione</div>
      <div class="rec-bar"><span class="rec-dot" id="rec-dot"></span>
        <span class="rec-status" id="rec-status">Pronto. Trascrizione live ottimale su Chrome (Mac).</span>
        <button class="btn btn-soft btn-sm" id="rec-btn" onclick="toggleRec()">Avvia</button>
        <button class="btn btn-primary btn-sm" id="sum-btn" onclick="genRiassunto()">✨ Riassumi</button></div>
      <div class="field"><label>Note / trascrizione</label>
        <textarea id="r-note" placeholder="Gli appunti compaiono qui, o scrivi a mano."></textarea></div>
      <div class="field"><label>Riassunto</label><textarea id="r-riassunto" style="min-height:66px"></textarea></div>
      <div class="field"><label>Decisioni prese</label><textarea id="r-decisioni" style="min-height:60px"></textarea></div>
      <div class="field"><label>Cose da fare</label><div id="r-todo"></div>
        <div class="taginput" style="margin-top:7px" onclick="this.querySelector('input').focus()">
          <input type="text" placeholder="To-do + Invio" onkeydown="todoKey(event)"></div></div>

      <hr class="divider">
      <div class="sec-label">📎 Allegati della riunione</div>
      <div id="r-alleg"></div>
      <input type="file" id="r-file" multiple style="display:none" onchange="uploadRiunFiles(event)">
      <button class="btn btn-soft btn-sm" onclick="document.getElementById('r-file').click()">＋ Aggiungi file</button>

      <div class="actions">
        <button class="btn btn-danger" id="r-del" onclick="delRiunione()" style="display:none">Elimina</button>
        <button class="btn btn-soft" id="r-pdf" onclick="exportPdf()" style="display:none">⬇ PDF</button>
        <div class="grow" style="flex:1"></div>
        <button class="btn btn-soft" onclick="closeModal('ov-riun')">Annulla</button>
        <button class="btn btn-primary" id="r-save" onclick="saveRiunione()">Salva</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CONTROPARTE -->
<div class="overlay" id="ov-cp">
  <div class="modal" style="max-width:520px">
    <div class="modal-head"><h2 id="mc-title">Nuova controparte</h2>
      <button class="mx" onclick="closeModal('ov-cp')">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Nome</label><input type="text" id="c-nome" placeholder="Es. GEDI"></div>
      <div class="field"><label>Categoria</label>
        <select id="c-cat">
          <option value="cliente">Cliente</option><option value="fornitore">Fornitore</option>
          <option value="dipendente">Dipendente</option><option value="sindacato">Sindacato</option>
          <option value="progetto">Altro progetto</option></select></div>
      <div class="field"><label>Descrizione</label><input type="text" id="c-desc" placeholder="Es. Fornitore carta e stampa"></div>
      <div class="field"><label>Società collegate</label><div class="chips" id="c-aziende"></div></div>
      <div class="actions">
        <button class="btn btn-danger" id="c-del" onclick="delControparte()" style="display:none">Elimina</button>
        <div class="grow" style="flex:1"></div>
        <button class="btn btn-soft" onclick="closeModal('ov-cp')">Annulla</button>
        <button class="btn btn-primary" id="c-save" onclick="saveControparte()">Salva</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL DOCUMENTO SCIOLTO -->
<div class="overlay" id="ov-doc">
  <div class="modal" style="max-width:520px">
    <div class="modal-head"><h2>Carica documento</h2>
      <button class="mx" onclick="closeModal('ov-doc')">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Titolo / oggetto</label><input type="text" id="d-titolo" placeholder="Es. Bozza contratto 2026"></div>

/* ═══════════════ OUTBOX ═══════════════ */
const KEY = 'riunioni_outbox_v1';

// Legge la coda dal browser (sopravvive a chiusura/riapertura)
function read() {
  try { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
  catch (_) { return []; }
}
function write(list) {
  try { localStorage.setItem(KEY, JSON.stringify(list)); } catch (_) {}
  updateBadge();
}
function outboxCount() { return read().length; }

// Riconosce un errore "di rete" (offline, server irraggiungibile…)
function isNetworkError(e) {
  if (!e) return false;
  const m = (e.message || e.error_description || e.toString() || '').toLowerCase();
  return !navigator.onLine ||
    m.includes('failed to fetch') || m.includes('networkerror') ||
    m.includes('load failed') || m.includes('err_internet') ||
    m.includes('fetch') && m.includes('network');
}

// Mette una riunione in coda. type: 'insert' | 'update'
function enqueue(entry) {
  const list = read();
  entry.queuedAt = Date.now();
  entry.localId = 'q-' + Math.random().toString(36).slice(2, 10);
  list.push(entry);
  write(list);
}

// Prova a svuotare la coda inviando tutto a Supabase.
// Ritorna quante ne ha sincronizzate.
let flushing = false;
async function flushOutbox({ silent = false } = {}) {
  if (flushing) return 0;
  if (!navigator.onLine) return 0;
  const list = read();
  if (!list.length) return 0;

  flushing = true;
  let done = 0, scartate = 0;
  const remaining = [];
  for (const entry of list) {
    try {
      let rid;
      if (entry.type === 'update' && entry.id) {
        await updateRiunione(entry.id, entry.payload);
        rid = entry.id;
      } else {
        const data = await insertRiunione(entry.payload);
        rid = data.id;
      }
      if (entry.personIds) await setRiunionePersone(rid, entry.personIds);
      done++;
    } catch (e) {
      // Se fallisce per RETE: la teniamo in coda, riproveremo.
      // Se fallisce per altro (dato non valido, errore DB): NON la ri-accodiamo
      // all'infinito — la scartiamo e avvisiamo, così la coda non si blocca.
      if (isNetworkError(e)) {
        remaining.push(entry);
      } else {
        scartate++;
        console.warn('Riunione in coda scartata (errore non recuperabile):', e?.message || e);
      }
    }
  }
  write(remaining);
  flushing = false;

  if (done && !silent) {
    toast(done === 1 ? '1 riunione sincronizzata' : `${done} riunioni sincronizzate`);
  }
  if (scartate && !silent) {
    toast(`${scartate} riunione/i in coda non valide, rimosse. Riprova a inserirle.`);
  }
  return done;
}

// ---------- INDICATORE VISIVO ----------
// Un piccolo badge che mostra quante riunioni sono in attesa.
function updateBadge() {
  let el = document.getElementById('outbox-badge');
  const n = read().length;
  if (!el) {
    if (!n) return;
    el = document.createElement('div');
    el.id = 'outbox-badge';
    el.onclick = () => flushOutbox();
    document.body.appendChild(el);
  }
  if (!n) { el.remove(); return; }
  el.innerHTML = `⏳ ${n} in attesa di rete`;
  el.title = 'Riunioni salvate in locale, verranno inviate appena torna la connessione. Clicca per riprovare ora.';
}

// ---------- AVVIO: sincronizza quando torna la rete ----------
function initOutbox() {
  updateBadge();
  // quando il browser rileva il ritorno online
  window.addEventListener('online', () => {
    toast('Connessione ripristinata, sincronizzo…');
    flushOutbox();
  });
  // tentativo periodico (ogni 30s) nel caso l'evento 'online' non scatti
  setInterval(() => { if (navigator.onLine && outboxCount()) flushOutbox({ silent: true }); }, 30000);
  // tentativo all'avvio, se c'è già qualcosa in coda
  if (navigator.onLine && outboxCount()) flushOutbox({ silent: true });
}

  nav.livello = 'storico';
  nav.azienda = (stato.cp.aziende || [])[0] || null;
  nav.categoria = stato.cp.categoria;
  nav.controparte = stato.cp;
  renderCrumb();
  await loadStorico();
  openEditRiun(riunioneId);
}

function render() {
  const cp = stato.cp;
  const otherAz = (cp.aziende || []).filter(a => a !== nav.azienda);
  let items = stato.items;
  if (stato.filtroAz) items = items.filter(it => (it.data.aziende || []).includes(stato.filtroAz));

  let html = `
    <div class="detail-head">
      <div class="dav">${initials(cp.nome)}</div>
      <div class="dt"><h2>${esc(cp.nome)}</h2>
        <div class="dsub">${esc(cp.descrizione || catLabel(cp.categoria))}</div>
        <div class="detail-badges">
          <span class="badge">${catLabel(cp.categoria)}</span>
          ${otherAz.length ? `<span class="badge o">Anche: ${otherAz.map(esc).join(', ')}</span>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-soft btn-sm" onclick="openEditCp()">✎ Modifica</button>
      </div>
    </div>
    <div class="detail-actions" style="margin-bottom:18px">
      <button class="btn btn-primary" onclick="openNewRiun()">🎙 Nuova riunione</button>
      <button class="btn btn-soft" onclick="openNewDoc()">⬆ Carica documento</button>
    </div>`;

  // Filtro società: solo se la controparte è su più società
  if ((cp.aziende || []).length > 1) {
    html += `<div class="filterbar"><span class="fl">Società</span>
      <span class="fchip ${!stato.filtroAz ? 'on' : ''}" onclick="setFiltro(null)">Tutte</span>
      ${(cp.aziende || []).map(a =>
        `<span class="fchip ${stato.filtroAz === a ? 'on' : ''}" onclick="setFiltro('${esc(a)}')">${esc(a)}</span>`).join('')}</div>`;
  }

  if (!items.length) {
    html += `<div class="empty"><div class="ei">🗓</div><div class="eb">Nessun elemento</div>
      <div>${stato.filtroAz ? 'Nessuna riunione o documento per questa società.' : 'Registra la prima riunione o carica un documento.'}</div></div>`;
    main().innerHTML = html;
    return;
  }

  html += `<div class="timeline">${items.map(renderItem).join('')}</div>`;
  main().innerHTML = html;
}

function renderItem(it) {
  const az = (it.data.aziende || []).map(a => `<span class="tl-aztag">${esc(a)}</span>`).join('');
  if (it.kind === 'riun') {
    const r = it.data;
    const nDoc = r.documenti?.[0]?.count || 0;
    return `<div class="tl-item"><div class="tl-card" onclick='openEditRiun(${JSON.stringify(r.id)})'>
      <div class="tl-date"><span class="tl-kind riun">Riunione</span>${fmtDate(r.data_ora, true)}${r.luogo ? ' · ' + esc(r.luogo) : ''}</div>
      <h4>${esc(r.titolo)}</h4>
      ${r.riassunto || r.note ? `<p>${esc((r.riassunto || r.note).slice(0, 180))}</p>` : ''}
      <div class="tl-meta">${az}
        ${(r.partecipanti || []).length ? `<span>👤 ${(r.partecipanti || []).length}</span>` : ''}
        ${nDoc ? `<span>📎 ${nDoc}</span>` : ''}</div></div></div>`;
  } else {
    const d = it.data;
    const ico = { file: '📄', mail: '✉️', nota: '🗒' }[d.tipo] || '📄';
    return `<div class="tl-item doc"><div class="tl-card doc" onclick='openDocView(${JSON.stringify(d.id)})'>
      <div class="tl-date"><span class="tl-kind doc">${d.tipo}</span>${fmtDate(d.data_doc)}</div>
      <h4>${ico} ${esc(d.titolo)}</h4>
      ${d.descrizione ? `<p>${esc(d.descrizione)}</p>` : ''}
      <div class="tl-meta">${az}</div></div></div>`;
  }
}

const selR = { aziende: new Set(), part: [], todo: [], alleg: [] };
let editR = null;
let rubrica = [];   // cache persone per l'autocompletamento

// Stato registrazione
let recog = null, recording = false, recBase = '';

// ---------- CHIP SOCIETÀ ----------

function reset() { selR.aziende = new Set(); selR.part = []; selR.todo = []; selR.alleg = []; }
async function openNewRiun() {

// ---------- PARTECIPANTI (dalla rubrica) ----------
// L'utente digita: mostriamo suggerimenti dalla rubrica. Enter su un
// nome nuovo lo aggiunge alla rubrica al salvataggio non serve: qui
// scegliamo solo tra persone esistenti; per crearne una c'è la Rubrica.
function partInput(e) {
  const q = e.target.value.trim().toLowerCase();
  const box = document.getElementById('r-part-sugg');
  if (!q) { box.innerHTML = ''; box.style.display = 'none'; return; }
  const scelti = new Set(selR.part.map(p => p.id));
  const disponibili = rubrica.filter(p => !scelti.has(p.id));
  const match = disponibili.filter(p =>
    p.nome.toLowerCase().includes(q) || (p.organizzazione || '').toLowerCase().includes(q)
  ).slice(0, 6);
  if (!match.length) {
    // distinguo: la persona esiste ma è già scelta, oppure non c'è proprio
    const giaScelto = selR.part.some(p =>
      p.nome.toLowerCase().includes(q) || (p.organizzazione || '').toLowerCase().includes(q));
    box.innerHTML = giaScelto
      ? `<div class="sugg-empty">Già fra i partecipanti.</div>`
      : `<div class="sugg-empty">Nessuno in rubrica con questo nome. Aggiungilo dalla sezione Rubrica.</div>`;
  } else {
    box.innerHTML = match.map(p =>
      `<div class="sugg-row" onclick="addPart('${p.id}')">
        <b>${esc(p.nome)}</b>${p.organizzazione ? `<span>${esc(p.organizzazione)}</span>` : ''}</div>`).join('');
  }
  box.style.display = 'block';
}
function addPart(id) {
  const p = rubrica.find(x => x.id === id);
  if (p && !selR.part.some(x => x.id === id)) selR.part.push(p);
  const inp = document.querySelector('#r-part-input');
  inp.value = ''; document.getElementById('r-part-sugg').style.display = 'none';
  renderTags(); inp.focus();
}
function partKey(e) {
  if (e.key === 'Escape') { document.getElementById('r-part-sugg').style.display = 'none'; return; }
  if (e.key === 'Enter') {
    e.preventDefault();
    const first = document.querySelector('#r-part-sugg .sugg-row');
    if (first) first.click();
  }
}
function renderTags() {
  const box = document.getElementById('r-part-tags');
  box.innerHTML = selR.part.map((p, i) =>
    `<span class="t">${esc(p.nome)}${p.organizzazione ? ` · ${esc(p.organizzazione)}` : ''} <b onclick="rmPart(${i})">×</b></span>`
  ).join('');
}
function rmPart(i) { selR.part.splice(i, 1); renderTags(); }

// ---------- TODO (con scadenza opzionale) ----------
function todoKey(e) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const v = e.target.value.trim();
  if (!v) return;
  selR.todo.push({ testo: v, fatto: false, scadenza: null }); e.target.value = ''; renderTodo();
}
function renderTodo() {
  document.getElementById('r-todo').innerHTML = selR.todo.map((t, i) => {
    // Selettore data nativo (calendarietto). Cliccando la scritta si apre.
    const label = t.scadenza
      ? `📅 ${fmtDate(t.scadenza)}`
      : '+ scadenza';
    const cls = t.scadenza ? 'todo-scad set' : 'todo-scad';
    const scad = `<span class="${cls}" onclick="openScadPicker(${i})">${label}</span>
      <input type="date" id="scad-input-${i}" value="${t.scadenza || ''}"
             style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none"
             onchange="setScad(${i}, this.value)">`;
    return `<div class="todo-item" style="position:relative"><input type="checkbox" ${t.fatto ? 'checked' : ''} onchange="toggleTodo(${i},this.checked)">
      <span class="${t.fatto ? 'done' : ''}" style="flex:1">${esc(t.testo)}</span>
      ${scad}
      <span class="del" onclick="rmTodo(${i})">×</span></div>`;
  }).join('');
}
function toggleTodo(i, v) { selR.todo[i].fatto = v; renderTodo(); }
function rmTodo(i) { selR.todo.splice(i, 1); renderTodo(); }
// Apre il calendarietto nativo del browser per scegliere la data
function openScadPicker(i) {
  const inp = document.getElementById('scad-input-' + i);
  if (!inp) return;
  // showPicker() apre il calendario dove supportato; altrimenti fallback al focus/click
  if (typeof inp.showPicker === 'function') { try { inp.showPicker(); return; } catch (_) {} }
  inp.focus(); inp.click();
}
// Riceve la data scelta dal calendarietto (già in formato AAAA-MM-GG, sempre valida)
function setScad(i, val) {
  selR.todo[i].scadenza = val || null;
  renderTodo();
}

// ---------- ALLEGATI ----------
function renderAlleg() {
  document.getElementById('r-alleg').innerHTML = selR.alleg.map((a, i) =>
    `<div class="alleg"><span>${fileIco(a.mime)}</span><span class="an">${esc(a.titolo)}</span>
      <a onclick="openFile('${a.storage_path}')">Apri</a>
      <span class="del" onclick="rmAlleg(${i})">×</span></div>`).join('');
}
function rmAlleg(i) { selR.alleg.splice(i, 1); renderAlleg(); }
async function openFile(path) {
  if (!path) return;
  const url = await signedUrl(path);
  if (url) window.open(url, '_blank');
}
async function uploadRiunFiles(e) {
  const files = [...e.target.files];
  if (!files.length) return;
  toast('Caricamento…');
  for (const f of files) {
    try {
      const { path, mime, size } = await uploadFile(f);
      selR.alleg.push({ titolo: f.name, storage_path: path, mime, dimensione: size, _new: true });
    } catch (_) { toast('Errore upload: ' + f.name); }
  }
  e.target.value = ''; renderAlleg(); toast('File aggiunti');
}

// ---------- SALVA / ELIMINA ----------
async function saveRiunione() {
  const titolo = document.getElementById('r-titolo').value.trim();
  if (!titolo) { toast('Serve un titolo.'); return; }
  const btn = document.getElementById('r-save');
  busy(btn, true);
  const payload = {
    controparte_id: stato.cp.id,
    titolo,
    data_ora: new Date(document.getElementById('r-data').value).toISOString(),
    luogo: document.getElementById('r-luogo').value.trim(),
    aziende: [...selR.aziende],
    // teniamo anche i nomi in chiaro (comodo per ricerca e PDF)
    partecipanti: selR.part.map(p => p.nome),
    note: document.getElementById('r-note').value,
    riassunto: document.getElementById('r-riassunto').value,
    decisioni: document.getElementById('r-decisioni').value,
    todo: selR.todo
  };
  try {
    let rid;
    if (editR) { await updateRiunione(editR.id, payload); rid = editR.id; }
    else { const data = await insertRiunione(payload); rid = data.id; }

    // Collegamento persone (rubrica)
    await setRiunionePersone(rid, selR.part.map(p => p.id));

    // Nuovi allegati -> creo documenti collegati alla riunione
    for (const a of selR.alleg.filter(x => x._new)) {
      await insertDocumento({
        controparte_id: stato.cp.id, riunione_id: rid, titolo: a.titolo,
        tipo: 'file', aziende: [...selR.aziende], storage_path: a.storage_path,
        mime: a.mime, dimensione: a.dimensione
      });
    }
    // Allegati rimossi in modifica -> elimino da DB e storage
    if (editR) {
      const keep = selR.alleg.filter(a => a.id).map(a => a.id);
      const origDocs = await listDocumentiDiRiunione(rid);
      for (const d of origDocs) if (!keep.includes(d.id)) {
        await deleteDocumento(d.id);
        if (d.storage_path) await removeFile(d.storage_path);
      }
    }
    toast('Salvato');
    closeOverlay('ov-riun');
    await loadStorico();
  } catch (e) {
    console.error('Errore salvataggio riunione:', e);
    if (isNetworkError(e)) {
      // Rete assente/instabile: salviamo in locale, sincronizzeremo dopo.
      // (gli allegati con file non vengono messi in coda: richiedono la rete
      //  per l'upload; note, decisioni, to-do e partecipanti sì.)
      enqueue({
        type: editR ? 'update' : 'insert',
        id: editR ? editR.id : null,
        payload,
        personIds: selR.part.map(p => p.id)
      });
      toast('Nessuna rete: riunione salvata in locale, la invio appena torni online.');
      closeOverlay('ov-riun');
    } else {
      toast('Errore nel salvataggio');
    }
  } finally {
    busy(btn, false, 'Salva');
  }
}
async function delRiunione() {
  if (!editR) return;
  if (!confirm('Eliminare questa riunione e i suoi allegati? Azione definitiva.')) return;
  const docs = await listDocumentiDiRiunione(editR.id);
  for (const d of docs) if (d.storage_path) await removeFile(d.storage_path);
  await deleteRiunione(editR.id);
  toast('Eliminata');
  closeOverlay('ov-riun');
  await loadStorico();
}

// ---------- REGISTRAZIONE (Web Speech API) ----------
// Ripristina i controlli allo stato "fermo" (pallino spento, pulsante Avvia).
function resetRecUI() {
  const dot = document.getElementById('rec-dot');
  const btn = document.getElementById('rec-btn');
  const st  = document.getElementById('rec-status');
  if (dot) dot.classList.remove('live');
  if (btn) btn.textContent = 'Avvia';
  if (st && !st.textContent.includes('non disponibile') && !st.textContent.includes('interrotta')
         && !st.textContent.includes('negato') && !st.textContent.includes('Microfono non'))
    st.textContent = 'Registrazione fermata.';
}

function toggleRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Trascrizione non supportata qui. Usa Chrome su Mac.'); return; }
  if (recording) {
    // Fermata VOLONTARIA: azzero lo stato PRIMA di stop(), così quando
    // scatta onend sa che non deve riavviare la registrazione.
    recording = false;
    document.getElementById('rec-dot').classList.remove('live');
    document.getElementById('rec-btn').textContent = 'Avvia';
    document.getElementById('rec-status').textContent = 'Registrazione fermata.';
    try { recog.stop(); } catch (_) {}
    return;
  }
  recog = new SR();
  recog.lang = 'it-IT'; recog.continuous = true; recog.interimResults = true;
  recBase = document.getElementById('r-note').value;
  recog.onresult = (ev) => {
    let fin = '', intr = '';
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      const t = ev.results[i][0].transcript;
      if (ev.results[i].isFinal) fin += t; else intr += t;
    }
    if (fin) recBase = (recBase ? recBase + ' ' : '') + fin.trim();
    document.getElementById('r-note').value = recBase + (intr ? ' ' + intr : '');
  };
  recog.onerror = (e) => {
    // Distinguiamo errori FATALI da errori TRANSITORI.
    // Transitori (no-speech, aborted): NON spegniamo, lasciamo che onend riavvii.
    // Fatali (network offline, not-allowed = permesso microfono negato): fermiamo.
    const fatale = (e.error === 'network' || e.error === 'not-allowed' || e.error === 'service-not-allowed' || e.error === 'audio-capture');
    if (fatale) {
      recording = false;
      const msg = e.error === 'network'
        ? 'Trascrizione non disponibile offline. Registra l\'audio e scrivi a mano; il testo arriverà quando sei online.'
        : (e.error === 'not-allowed' || e.error === 'service-not-allowed')
        ? 'Permesso microfono negato. Consenti l\'accesso al microfono e riprova.'
        : e.error === 'audio-capture'
        ? 'Microfono non disponibile. Controlla che non sia usato da un\'altra app.'
        : 'Trascrizione interrotta (' + e.error + '). Puoi scrivere a mano.';
      document.getElementById('rec-status').textContent = msg;
    }
    // Se transitorio non facciamo nulla: onend penserà a riavviare.
  };
  recog.onend = () => {
    // Riavvio automatico SOLO se stiamo ancora registrando volontariamente.
    // In continuous mode il browser chiude la sessione dopo silenzi/pause: la riapriamo.
    // Un piccolo ritardo evita l'errore "già avviato" del riavvio immediato.
    if (recording) {
      setTimeout(() => {
        if (!recording) return;             // l'utente potrebbe aver fermato nel frattempo
        try { recog.start(); }
        catch (_) {
          // se fallisce anche col ritardo, un secondo tentativo poi si arrende
          setTimeout(() => { if (recording) { try { recog.start(); } catch (__) { recording = false; resetRecUI(); } } }, 400);
        }
      }, 250);
      return;
    }
    // stato "fermo": ripristina sempre il pulsante
    recording = false;
    resetRecUI();
  };
  recog.start(); recording = true;
  document.getElementById('rec-dot').classList.add('live');
  document.getElementById('rec-btn').textContent = 'Ferma';
  document.getElementById('rec-status').textContent = 'Registrazione in corso… parla pure.';
}

// ---------- RIASSUNTO AI (via Edge Function ponte su Supabase) ----------
async function genRiassunto() {
  const note = document.getElementById('r-note').value.trim();
  if (!note) { toast('Scrivi o registra prima le note.'); return; }
  const btn = document.getElementById('sum-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
  try {
    // Ricaviamo CHI partecipa alla riunione, così l'AI usa i nomi e i ruoli giusti
    // invece di "Interlocutore 1/2". La controparte è quella sotto cui è salvata la riunione.
    const controparte = (nav.controparte && nav.controparte.nome) ? nav.controparte.nome : '';
    const categoria = (nav.controparte && nav.controparte.categoria) ? nav.controparte.categoria : '';
    // Chiamiamo la funzione ponte, che gira su Supabase e parla lei con l'AI.
    const res = await fetch(SUPABASE_URL + '/functions/v1/riassunto', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify({ note, io: 'Marco', controparte, categoria })
    });
    const txt = await res.text();
    if (!res.ok) {
      console.error('Errore funzione riassunto:', res.status, txt);
      throw new Error('HTTP ' + res.status);
    }
    let o;
    try { o = JSON.parse(txt); }
    catch (_) { console.error('Risposta non-JSON:', txt); throw new Error('Risposta non valida'); }
    if (o.error) { console.error('Errore lato funzione:', o); throw new Error(o.error); }

    // Trascrizione ripulita: la proponiamo, sostituisce il testo grezzo se l'utente accetta.
    if (o.trascrizione && o.trascrizione.trim()) {
      if (confirm('L\'AI ha ripulito la trascrizione (parole corrette, interlocutori separati). Vuoi sostituire il testo grezzo con la versione pulita?\n\n(Il testo originale verrà rimpiazzato; se preferisci tenerlo, annulla.)')) {
        document.getElementById('r-note').value = o.trascrizione.trim();
      }
    }
    if (o.riassunto) document.getElementById('r-riassunto').value = o.riassunto;
    if (o.decisioni) document.getElementById('r-decisioni').value = o.decisioni;
    if (Array.isArray(o.todo)) o.todo.forEach(t => {
      if (typeof t === 'string') selR.todo.push({ testo: t, fatto: false, scadenza: null });
      else selR.todo.push({ testo: t.testo, fatto: false, scadenza: t.scadenza || null });
    });
    renderTodo(); toast('Riassunto generato');
  } catch (e) {
    console.error('Errore riassunto AI:', e);
    toast('Riassunto non riuscito. Riprova.');
  } finally {
    btn.disabled = false; btn.innerHTML = '✨ Riassumi';
  }
}

/* ═══════════════ HOME ═══════════════ */
// Giorni tra oggi e una data ISO (negativo = scaduto)
function giorniA(scadenzaIso) {
  const oggi = new Date(); oggi.setHours(0, 0, 0, 0);
  const d = new Date(scadenzaIso); d.setHours(0, 0, 0, 0);
  return Math.round((d - oggi) / 86400000);
}
function urgenza(g) {
  if (g < 0) return { cls: 'scaduto', lab: `scaduto da ${-g}g` };
  if (g === 0) return { cls: 'oggi', lab: 'oggi' };
  if (g <= 7) return { cls: 'presto', lab: `tra ${g}g` };
  return { cls: 'ok', lab: fmtDate(new Date(Date.now() + g * 86400000).toISOString()) };
}
async function goHome() {
  document.getElementById('crumb').innerHTML =
    `<b><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg> Cruscotto</b>`;

  const todos = await listTodoAperti();

  // Scadenze: solo to-do con data, ordinate per data crescente
  const conScadenza = todos.filter(t => t.scadenza)
    .map(t => ({ ...t, g: giorniA(t.scadenza) }))
    .sort((a, b) => a.g - b.g);
  const imminenti = conScadenza.filter(t => t.g <= 15);

  // To-do senza scadenza, raggruppati per controparte
  const perControparte = {};
  todos.filter(t => !t.scadenza).forEach(t => {
    (perControparte[t.controparte_nome] ||= []).push(t);
  });

  let html = `<h1 class="view-title">Cruscotto</h1>
    <p class="view-sub">Le tue attività aperte in tutto il gruppo, con le scadenze in arrivo.</p>`;

  // --- RADAR SCADENZE ---
  html += `<div class="dash-block">
    <div class="dash-h"><span class="dash-ic">⏰</span> Scadenze in arrivo
      <span class="dash-count">${imminenti.length}</span></div>`;
  if (!imminenti.length) {
    html += `<div class="dash-empty">Nessuna scadenza nei prossimi 15 giorni.</div>`;
  } else {
    html += `<div class="dead-list">${imminenti.map(t => {
      const u = urgenza(t.g);
      return `<div class="dead-row ${u.cls}" onclick='openRiunioneById(${JSON.stringify(t.riunione_id)})'>
        <span class="dead-badge ${u.cls}">${u.lab}</span>
        <div class="dead-body"><b>${esc(t.testo)}</b>
          <span class="dead-meta">${esc(t.controparte_nome)} · ${esc(t.riunione_titolo)}</span></div>
        <span class="dead-arrow">›</span></div>`;
    }).join('')}</div>`;
  }
  html += `</div>`;

  // --- TO-DO APERTI ---
  const gruppi = Object.entries(perControparte);
  const totAperti = todos.length;
  html += `<div class="dash-block">
    <div class="dash-h"><span class="dash-ic">✓</span> Attività aperte
      <span class="dash-count">${totAperti}</span></div>`;
  if (!totAperti) {
    html += `<div class="dash-empty">Nessuna attività aperta. Tutto sotto controllo.</div>`;
  } else if (!gruppi.length) {
    html += `<div class="dash-empty">Tutte le attività aperte hanno una scadenza: le trovi qui sopra.</div>`;
  } else {
    html += gruppi.map(([cp, items]) => `
      <div class="todo-group"><div class="todo-group-h">${esc(cp)}</div>
        ${items.map(t => `<div class="todo-line" onclick='openRiunioneById(${JSON.stringify(t.riunione_id)})'>
          <span class="todo-dot"></span><span>${esc(t.testo)}</span>
          <span class="todo-line-meta">${esc(t.riunione_titolo)}</span></div>`).join('')}
      </div>`).join('');
  }
  html += `</div>`;

  main().innerHTML = html;
}
